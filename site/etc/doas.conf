# /etc/doas.conf -- velo doas policy.  Mode 0600 root:wheel (doas refuses a
# group/other-writable config).  install.site re-chmods this 0600.
# STATIC-authored on the Void host -- verify with `doas -C /etc/doas.conf` in 7.9 VM (M3).

# Wheel members may run any command, caching the auth for a few minutes.
permit persist :wheel
permit persist :wheel cmd /usr/local/bin/velo-level

# NOTE: there is deliberately NO passwordless package-install rule here.  The
# offline first-boot package install runs from /etc/rc.firsttime, which already
# executes as root -- no doas needed.  A nopass rule for the installer would be a
# privilege-escalation hole: packages can carry @exec post-install scripts, so a
# passwordless installer = passwordless root code-execution for any wheel member.
