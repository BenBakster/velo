# velo sysctl deltas -- L3 (= L2 IPv6-off + anti-leak knobs). Appended.
# L3 is the Tor-only fail-closed level; IPv6 stays off (Tor can't carry it) and
# any forwarding/redirect/source-route path that could leak around Tor is shut.
# FLAG: confirm IPv6-fully-off idiom + anti-leak completeness in the VM (M3).
net.inet.ip.forwarding=0
net.inet.ip.redirect=0
net.inet6.ip6.forwarding=0
net.inet6.ip6.redirect=0
net.inet6.ip6.accept_rtadv=0
net.inet.ip.sourceroute=0
net.inet.ip.directed-broadcast=0
