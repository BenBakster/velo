# velo sysctl deltas -- L2 (= L1 + IPv6 disabled at the stack). Appended.
# Disable IPv6 forwarding and shut the stack down so there are no global v6
# addrs; the pf `block out inet6` in pf.l2.conf is the fail-safe second layer.
# FLAG: confirm the exact 7.9 idiom to fully disable IPv6 (rc.conf.local /
#       `ifconfig inet6` / sysctl) in the VM (M3); pf block is the backstop.
net.inet.ip.forwarding=0
net.inet.ip.redirect=0
net.inet6.ip6.forwarding=0
net.inet6.ip6.redirect=0
net.inet6.ip6.accept_rtadv=0
