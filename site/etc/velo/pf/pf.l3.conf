# velo pf.conf -- L3 (Tor-only, fail-closed).
# Block ALL traffic by default.  The ONLY process allowed to touch the network is
# Tor (user _tor).  Every other program reaches the outside world EXCLUSIVELY via
# Tor's SOCKS proxy on 127.0.0.1:9050 (loopback is skipped, so app->SOCKS passes);
# a program that does NOT speak SOCKS gets NOTHING -- it cannot leak to the
# clearnet, it simply fails.  If Tor is down there is no path out at all -> the box
# is fail-closed (no anonymity-stripping fallback to a direct connection).
#
# WHY SOCKS, NOT A TRANSPARENT rdr/divert PROXY:
#   Transparently redirecting a SINGLE host's OWN outbound into a local Tor
#   TransPort is fragile on OpenBSD: rdr-to needs Tor to read /dev/pf for the NAT
#   lookup (a privilege/timing dance -- Tor must open /dev/pf before it drops to
#   _tor), and divert-to is really meant for FORWARDED traffic on a gateway's
#   internal interface, not the host's own packets.  SOCKS needs none of that, so
#   this is the robust, certain no-leak posture for a one-box appliance.  (A future
#   2-box Whonix-style split could use transparent redirect cleanly; out of scope.)
#
# Requires: tor running with its default SOCKSPort 127.0.0.1:9050 (see the
#           /etc/tor/torrc shipped by the fortress/L3 site bits).
# STATIC-authored on the Void host -- verify with `pfctl -nf` in the 7.9 VM, and
# prove the live differential (direct = blocked, torsocks = OK) on a booted box.
tor_uid = "_tor"
set skip on lo                    # loopback free: apps reach 127.0.0.1:9050 (Tor SOCKS)
set block-policy drop
block all                         # FAIL-CLOSED: deny in AND out by default

# Tor itself -- and ONLY Tor -- may reach the network directly.
pass out quick proto tcp user $tor_uid keep state
# UDP pass for _tor only: tor currently egresses TCP, but keep this for parity and
# future UDP transports (e.g. obfs/conflux).  It opens nothing to non-_tor traffic.
pass out quick proto udp user $tor_uid keep state

# Everything else stays blocked: no direct TCP, no UDP (incl. clearnet DNS), no
# ICMP, no IPv6.  Non-Tor programs MUST use Tor's SOCKS 127.0.0.1:9050 (reachable
# because loopback is skipped above); torsocks resolves DNS through Tor too, so
# there is no DNS leak.  Anything that tries to go direct is dropped.
# No inbound at all.
