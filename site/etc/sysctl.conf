# /etc/sysctl.conf -- velo BASE hardening (level deltas are APPENDED by
# install.site from /etc/velo/sysctl/sysctl.<lvl>.conf -- never overwriting this).
# These are conservative, level-independent knobs that apply to every install.

# Hide other users' processes from non-root (ps shows only your own).
kern.allowkmem=0

# Do not allow core dumps from setuid/setgid programs.
kern.nosuidcoredump=1

# Address-space randomisation / W^X are kernel defaults on OpenBSD; documented
# here for audit, not toggled.  Level files add the network-leak knobs.
